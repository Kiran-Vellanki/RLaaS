spring.application.name=flowguard-core
server.port=8080
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cloud.gateway.server.webflux.routes[0].id=cart-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/cartService/**

spring.datasource.url=jdbc:mysql://localhost:3306/flowguard
spring.datasource.username=root
spring.datasource.password=<your password>

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
